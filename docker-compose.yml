services:
  # ============================================================
  # KAFKA (KRaft Mode - NO Zookeeper)
  # ============================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - fraud-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - fraud-network

  # ============================================================
  # HADOOP HDFS
  # ============================================================
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      - CLUSTER_NAME=fraud-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HDFS_CONF_dfs_namenode_rpc___address=namenode:8020
      - HDFS_CONF_dfs_replication=1
    volumes:
      - namenode_data:/hadoop/dfs/name
    healthcheck:
      test: curl -f http://localhost:9870/ || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - fraud-network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - fraud-network

  # ============================================================
  # SPARK (Custom image with ML libraries)
  # ============================================================
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-spark:3.5.3
    container_name: spark-master
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --ip 0.0.0.0 --port 7077 --webui-port 8080
    volumes:
      - ./spark:/opt/spark/work/spark
      - ./producer:/opt/spark/work/producer
      - ./models:/opt/spark/work/models
      - ./data:/opt/spark/work/data
    healthcheck:
      test: curl -f http://localhost:8080/ || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - fraud-network

  spark-worker:
    image: fraud-spark:3.5.3
    container_name: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - ./spark:/opt/spark/work/spark
      - ./producer:/opt/spark/work/producer
      - ./models:/opt/spark/work/models
      - ./data:/opt/spark/work/data
    networks:
      - fraud-network

  # ============================================================
  # REDIS (Pub/Sub + Alert storage)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: redis-cli ping | grep PONG || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - fraud-network

  # ============================================================
  # FASTAPI SERVING LAYER
  # ============================================================
  serving:
    build:
      context: ./serving
      dockerfile: Dockerfile
    container_name: serving
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" || exit 1
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

volumes:
  namenode_data:
  datanode_data:
